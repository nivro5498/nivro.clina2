name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Se a sua branch principal se chamar "master", mude aqui para "master"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false # Isso impede o erro de cancelamento que você viu!

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Se o seu arquivo HTML estiver solto na raiz do projeto, deixe o ponto '.'
          # Se ele estiver dentro de uma pasta (como 'public' ou 'dist'), mude para ./public
          path: '.' 
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
